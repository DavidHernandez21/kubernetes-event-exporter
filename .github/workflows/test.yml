name: Test
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.go"
      - go.mod
      - go.sum
  push:
    branches:
      - main
    paths:
      - "**.go"
      - go.mod
      - go.sum
jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      eventbridge: ${{ steps.filter.outputs.eventbridge }}
      firehose: ${{ steps.filter.outputs.firehose }}
      kinesis: ${{ steps.filter.outputs.kinesis }}
      opscenter: ${{ steps.filter.outputs.opscenter }}
      sqs: ${{ steps.filter.outputs.sqs }}
      sns: ${{ steps.filter.outputs.sns }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            eventbridge:
              - 'pkg/sinks/eventbridge.go'
              - 'pkg/sinks/eventbridge_integration_test.go'
              - 'pkg/sinks/eventbridge_test.go'
              - 'pkg/sinks/eventbridge*.go'
            firehose:
              - 'pkg/sinks/firehose.go'
              - 'pkg/sinks/firehose_integration_test.go'
              - 'pkg/sinks/firehose_test.go'
              - 'pkg/sinks/firehose*.go'
            kinesis:
              - 'pkg/sinks/kinesis.go'
              - 'pkg/sinks/kinesis_integration_test.go'
              - 'pkg/sinks/kinesis_test.go'
              - 'pkg/sinks/kinesis*.go'
            opscenter:
              - 'pkg/sinks/opscenter.go'
              - 'pkg/sinks/opscenter_integration_test.go'
              - 'pkg/sinks/opscenter_test.go'
              - 'pkg/sinks/opscenter*.go'
            sqs:
              - 'pkg/sinks/sqs.go'
              - 'pkg/sinks/sqs_integration_test.go'
              - 'pkg/sinks/sqs_test.go'
              - 'pkg/sinks/sqs*.go'
            sns:
              - 'pkg/sinks/sns.go'
              - 'pkg/sinks/sns_integration_test.go'
              - 'pkg/sinks/sns_test.go'
              - 'pkg/sinks/sns*.go'

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Set up Go 1.26.5
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.5"
        id: go

      - name: Build
        run: go build -v .

      - name: Test
        run: go test ./...

  integration-sqs:
    name: Integration SQS
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.sqs == 'true'
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Set up Go 1.26.5
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.5"
        id: go

      - name: Test SQS integration
        run: go test -tags=integration ./pkg/sinks -run ^TestSQSSinkLocalStack$

  integration-sns:
    name: Integration SNS
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.sns == 'true'
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Set up Go 1.26.5
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.5"
        id: go

      - name: Test SNS integration
        run: go test -tags=integration ./pkg/sinks -run ^TestSNSSinkLocalStack$

  integration-firehose:
    name: Integration Firehose
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.firehose == 'true'
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Set up Go 1.26.5
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.5"
        id: go

      - name: Test Firehose integration
        run: go test -tags=integration ./pkg/sinks -run ^TestFirehoseSinkLocalStack$

  integration-eventbridge:
    name: Integration EventBridge
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.eventbridge == 'true'
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Set up Go 1.26.5
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.5"
        id: go

      - name: Test EventBridge integration
        run: go test -tags=integration ./pkg/sinks -run ^TestEventBridgeSinkLocalStack$

  integration-kinesis:
    name: Integration Kinesis
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.kinesis == 'true'
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Set up Go 1.26.5
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.5"
        id: go

      - name: Test Kinesis integration
        run: go test -tags=integration ./pkg/sinks -run ^TestKinesisSinkLocalStack$

  integration-opscenter:
    name: Integration OpsCenter
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.opscenter == 'true'
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Set up Go 1.26.5
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.5"
        id: go

      - name: Test OpsCenter integration
        run: go test -tags=integration ./pkg/sinks -run ^TestOpsCenterSinkLocalStack$
