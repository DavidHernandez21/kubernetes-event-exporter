name: Test
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.go"
      - go.mod
      - go.sum
  push:
    branches:
      - main
    paths:
      - "**.go"
      - go.mod
      - go.sum
jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      sqs: ${{ steps.filter.outputs.sqs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sqs:
              - 'pkg/sinks/sqs.go'
              - 'pkg/sinks/sqs_integration_test.go'
              - 'pkg/sinks/sqs_test.go'
              - 'pkg/sinks/sqs*.go'

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Set up Go 1.26.1
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
        id: go

      - name: Build
        run: go build -v .

      - name: Test
        run: go test ./...

  integration-sqs:
    name: Integration SQS
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.sqs == 'true'
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Set up Go 1.26.1
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
        id: go

      - name: Test SQS integration
        run: go test -tags=integration ./pkg/sinks -run ^TestSQSSinkLocalStack$
