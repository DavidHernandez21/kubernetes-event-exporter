name: Test
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.go"
      - go.mod
      - go.sum
  push:
    branches:
      - main
    paths:
      - "**.go"
      - go.mod
      - go.sum
jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      sqs: ${{ steps.filter.outputs.sqs }}
      sns: ${{ steps.filter.outputs.sns }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            sqs:
              - 'pkg/sinks/sqs.go'
              - 'pkg/sinks/sqs_integration_test.go'
              - 'pkg/sinks/sqs_test.go'
              - 'pkg/sinks/sqs*.go'
            sns:
              - 'pkg/sinks/sns.go'
              - 'pkg/sinks/sns_integration_test.go'
              - 'pkg/sinks/sns_test.go'
              - 'pkg/sinks/sns*.go'

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Set up Go 1.26.3
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.3"
        id: go

      - name: Build
        run: go build -v .

      - name: Test
        run: go test ./...

  integration-sqs:
    name: Integration SQS
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.sqs == 'true'
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Set up Go 1.26.3
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.3"
        id: go

      - name: Test SQS integration
        run: go test -tags=integration ./pkg/sinks -run ^TestSQSSinkLocalStack$

  integration-sns:
    name: Integration SNS
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.sns == 'true'
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Set up Go 1.26.3
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.3"
        id: go

      - name: Test SNS integration
        run: go test -tags=integration ./pkg/sinks -run ^TestSNSSinkLocalStack$
